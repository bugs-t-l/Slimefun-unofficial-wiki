<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSlimefun Wiki</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0f0f0f;
    color: #eaeaea;
    display: flex;
    justify-content: center;
  }

  .container {
    max-width: 1100px;
    width: 100%;
    padding: 20px;
  }

  header {
    text-align: center;
    padding: 40px 20px 20px;
  }

  header h1 {
    font-size: 3em;
    margin: 0;
  }

  header p {
    color: #aaa;
    margin-top: 10px;
  }

  /* DROPDOWN */
  .dropdown {
    background: #1a1a1a;
    border-radius: 10px;
    margin-bottom: 15px;
    overflow: hidden;
  }

  .dropdown-header {
    padding: 15px;
    cursor: pointer;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .dropdown-header:hover {
    background: #222;
  }

  .dropdown-content {
    display: none;
    padding: 15px;
    border-top: 1px solid #333;
  }

  .item {
    padding: 8px 0;
    color: #4da3ff;
    cursor: pointer;
  }

  .item:hover {
    text-decoration: underline;
  }

  footer {
    text-align: center;
    margin-top: 40px;
    color: #777;
    font-size: 0.9em;
  }

</style>
</head>

<body>
<div class="container">

  <header>
    <h1>Slimefun Wiki</h1>
    <p>Your guide to items, weapons, tools, and machines</p>
  </header>

  <!-- DROPDOWNS -->
  <h2>Categories</h2>

  <div class="dropdown">
    <div class="dropdown-header" onclick="toggleDropdown(this)">
      Weapons
      <span>+</span>
    </div>
    <div class="dropdown-content">
      <div class="item" onclick="location.href='weapons/sword.html'">Nothing yet</div>
    </div>
  </div>

  <div class="dropdown">
    <div class="dropdown-header" onclick="toggleDropdown(this)">
      Tools
      <span>+</span>
    </div>
    <div class="dropdown-content">
      <div class="item" onclick="location.href='weapons/sword.html'">Nothing yet</div>
    </div>
  </div>

  <div class="dropdown">
    <div class="dropdown-header" onclick="toggleDropdown(this)">
      Machines
      <span>+</span>
    </div>
    <div class="dropdown-content">
      <div class="item" onclick="location.href='weapons/sword.html'">Nothing yet</div>
    </div>
  </div>

  <div class="dropdown">
    <div class="dropdown-header" onclick="toggleDropdown(this)">
      Items
      <span>+</span>
    </div>
    <div class="dropdown-content">
      <div class="item" onclick="location.href='weapons/sword.html'">Nothing yet</div>
    </div>
  </div>

  <footer>
    Wiki Homepage Template
  </footer>

</div>

<script>
  function toggleDropdown(header) {
    const content = header.nextElementSibling;
    const symbol = header.querySelector("span");

    if (content.style.display === "block") {
      content.style.display = "none";
      symbol.textContent = "+";
    } else {
      content.style.display = "block";
      symbol.textContent = "-";
    }
  }
</script>

</body>
</html>
